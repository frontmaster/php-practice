<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>todo</title>
    <link rel="stylesheet" href="css/todo_style.css">
    <script src="js/todo.js" defer></script>Ï
</head>

<body>
    <div class="main">
        <h1 class="mainTitle">todoリスト</h1>
        <div class="inputArea">
            <input type="text" id="add-text" class="input" placeholder="TODOを入力してください">
            <button id="add-button" class="c-btn btn-input">追加</button>
        </div>

        <div class="inCompleteArea">
            <h2 class="subTitle">未完了のTODO</h2>
            <ul id="incomplete-list"></ul>
        </div>

        <div class="completeArea">
            <h2 class="subTitle">完了したTODO</h2>
            <ul id="complete-list"></ul>
        </div>
    </div>
</body>

</html>
